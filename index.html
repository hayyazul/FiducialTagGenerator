<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AprilTag PDF Generator</title>
    <style>
      html, body { margin: 0; height: 100%; overflow: hidden; }
      body { font-family: system-ui, sans-serif; color: #222; }
      #app { height: 100%; display: flex; }
      .form-pane { flex: 1; padding: 0.75rem 1rem;
                   overflow-y: auto; box-sizing: border-box; }
      .preview-pane { flex: 1; padding: 0.75rem 1rem 2.5rem;
                      overflow-y: auto; box-sizing: border-box;
                      /* Edge shadows that appear only when there is more to
                         scroll: the white "covers" scroll with the content and
                         hide the (scroll-port-fixed) shadows at whichever edge
                         you've reached. */
                      background:
                        linear-gradient(#fff 30%, rgba(255,255,255,0)),
                        linear-gradient(rgba(255,255,255,0), #fff 70%) 0 100%,
                        radial-gradient(farthest-side at 50% 0,
                          rgba(0,0,0,0.12), rgba(0,0,0,0)),
                        radial-gradient(farthest-side at 50% 100%,
                          rgba(0,0,0,0.12), rgba(0,0,0,0)) 0 100%;
                      background-repeat: no-repeat;
                      background-size: 100% 28px, 100% 28px, 100% 10px, 100% 10px;
                      background-attachment: local, local, scroll, scroll; }
      .preview-pane #preview { max-width: 600px; margin: 0 auto; }
      h1 { margin: 0 0 0.75rem; font-size: 1.2rem; }
      fieldset { margin: 0 0 0.75rem; padding: 0.5rem 0.75rem; border: 1px solid #ccc; }
      fieldset label { display: inline-block; margin-right: 1rem; margin-bottom: 0.25rem; }
      input[type="number"], input[type="text"], select {
        padding: 0.15rem 0.3rem;
        border: 1px solid #ccc; border-radius: 0;
        font: inherit; color: inherit; background: #fff;
      }
      input[type="number"], input[type="text"] { width: 8em; }
      input#ids { width: 16em; }
      select { width: auto; max-width: 100%; }
      button#downloadPdf {
        font: inherit; background: #fff; color: #222;
        border: 1px solid #222; border-radius: 0;
        padding: 0.35rem 0.7rem;
      }
      button#downloadPdf:disabled {
        border-color: #ccc; color: #888;
      }
      input.invalid, select.invalid { border-color: #c00; }
      .field-error { display: inline-block; margin-left: 0.4rem;
                     color: #c00; font-size: 0.85em; }
      .field-error:empty { display: none; }
      #info { margin: 0.4rem 0 1rem; font-size: 0.9em; color: #555; }
      #info p { margin: 0.15rem 0; }
      #info .summary { color: #222; }
      #info .problem { color: #c00; }
      section { margin: 0 0 1rem; }
      section h3 { margin: 0 0 0.4rem; font-size: 0.95rem; color: #666; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
