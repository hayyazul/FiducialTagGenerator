<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AprilTag PDF Generator</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 1.5rem; max-width: 900px; color: #222; }
      h1 { margin-top: 0; }
      fieldset { margin: 0 0 0.75rem; padding: 0.5rem 0.75rem; border: 1px solid #ccc; }
      fieldset label { display: inline-block; margin-right: 1rem; margin-bottom: 0.25rem; }
      input[type="number"], input[type="text"], select { width: 8em; padding: 0.15rem 0.3rem; }
      hr { margin: 1rem 0; border: 0; border-top: 1px solid #ddd; }
      section { margin: 0.75rem 0 1.5rem; }
      section h3 { margin: 0 0 0.4rem; font-size: 0.95rem; color: #666; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
